<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>英単語テストPro - 完全版</title>
    <style>
        /* レイアウト設定 */
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; margin: 0; background: #f0f2f5; display: flex; height: 100vh; overflow: hidden; }
        .settings-panel { width: 380px; background: #fff; border-right: 1px solid #ccc; padding: 20px; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .preview-panel { flex: 1; padding: 20px; overflow-y: auto; display: flex; justify-content: center; background: #525659; }
        .test-paper { width: 210mm; min-height: 297mm; background: #fff; padding: 40px; box-sizing: border-box; }
        
        /* 設定項目のスタイル */
        h2 { border-left: 5px solid #007bff; padding-left: 10px; font-size: 1.2em; margin-bottom: 20px; }
        .config-group { margin-bottom: 15px; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
        label { display: block; font-size: 11px; font-weight: bold; color: #555; margin-bottom: 4px; }
        select, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 16px; }
        
        .btn-main { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; height: 50px; font-size: 18px; transition: 0.2s; }
        .btn-main:hover { background: #0056b3; }
        .btn-sub { background: #28a745; color: white; border: none; cursor: pointer; }
        .btn-print { background: #6c757d; color: white; border: none; cursor: pointer; }

        /* テスト用紙のスタイル */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #000; padding: 10px; text-align: left; height: 30px; }
        .col-no { width: 40px; text-align: center; }
        .header-area { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 20px; }
        
        @media print {
            .settings-panel { display: none; }
            .preview-panel { background: none; padding: 0; }
            .test-paper { box-shadow: none; margin: 0; }
        }
    </style>
</head>
<body>

<div class="settings-panel">
    <h2>📝 テスト作成設定</h2>
    
    <div class="config-group">
        <label>学校名 (表示用)</label>
        <select id="school">
            <option value="木太中">木太中</option>
            <option value="玉藻中">玉藻中</option>
            <option value="桜町中">桜町中</option>
            <option value="附属中">附属中</option>
        </select>
        <label>出題モード</label>
        <select id="mode">
            <option value="en-ja">英語 → 日本語訳</option>
            <option value="ja-en">日本語 → 英語</option>
        </select>
    </div>

    <div class="config-group">
        <label>▼ 開始範囲</label>
        <select id="start-unit" onchange="updateStartParts()"></select>
        <select id="start-part"></select>
    </div>

    <div style="text-align: center; margin: -5px 0 10px; font-size: 20px;">⬇</div>

    <div class="config-group">
        <label>▼ 終了範囲</label>
        <select id="end-unit" onchange="updateEndParts()"></select>
        <select id="end-part"></select>
    </div>

    <button class="btn-main" onclick="generateTest()">🔄 問題を生成</button>
    <button class="btn-sub" onclick="toggleAnswer()">👁 解答表示：OFF</button>
    <button class="btn-print" onclick="window.print()">🖨 印刷 / PDF保存</button>
</div>

<div class="preview-panel">
    <div class="test-paper" id="paper">
        <div class="header-area">
            <div style="font-size: 14px;">名前 ____________________</div>
            <h1 style="margin: 0; font-size: 24px;">英単語テスト</h1>
            <div id="info-tag" style="font-size: 12px; font-weight: bold;"></div>
        </div>
        <p id="range-display" style="font-size: 11px; margin: 5px 0; color: #444;"></p>
        <table>
            <thead>
                <tr>
                    <th class="col-no">No.</th>
                    <th id="th-q">英単語</th>
                    <th id="th-a">日本語訳</th>
                </tr>
            </thead>
            <tbody id="test-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    let allData = [];
    let isShowAnswer = false;

    // 1. CSV読み込み (画像 image_ac4e7e.png の5列構成に対応)
    async function init() {
        try {
            const res = await fetch('wordlist.csv');
            const text = await res.text();
            // 改行で分割し、空行を除去。1行目は見出しとして飛ばす。
            const rows = text.split(/\r?\n/).filter(line => line.trim() !== "").slice(1);
            
            allData = rows.map(row => {
                const c = row.split(',');
                return { 
                    key: c[0],   // 学年ユニット単元 (連結キー)
                    unitGroup: c[1], // 学年ユニット (プルダウン用)
                    part: c[2],  // 単元 (プルダウン用)
                    en: c[3],    // 英語
                    ja: c[4]     // 日本語
                };
            }).filter(d => d.en);

            setupSelects();
        } catch (e) {
            alert("wordlist.csvを読み込めませんでした。index.htmlと同じフォルダにありますか？");
        }
    }

    // 2. プルダウンのセットアップ
    function setupSelects() {
        const units = [...new Set(allData.map(d => d.unitGroup))];
        const sUnit = document.getElementById('start-unit');
        const eUnit = document.getElementById('end-unit');

        units.forEach(u => {
            sUnit.add(new Option(u, u));
            eUnit.add(new Option(u, u));
        });

        updateStartParts();
        updateEndParts();
    }

    function updateStartParts() { updateParts('start'); }
    function updateEndParts() { updateParts('end'); }

    function updateParts(prefix) {
        const unitVal = document.getElementById(`${prefix}-unit`).value;
        const partSel = document.getElementById(`${prefix}-part`);
        const parts = [...new Set(allData.filter(d => d.unitGroup === unitVal).map(d => d.part))];
        
        partSel.innerHTML = '';
        parts.forEach(p => partSel.add(new Option(p, p)));
    }

    // 3. 問題生成ロジック (VBAの範囲抽出を再現)
    function generateTest() {
        const school = document.getElementById('school').value;
        const sU = document.getElementById('start-unit').value;
        const sP = document.getElementById('start-part').value;
        const eU = document.getElementById('end-unit').value;
        const eP = document.getElementById('end-part').value;
        const mode = document.getElementById('mode').value;

        // VBAと同じ「連結キー」での検索
        const sKey = sU + sP;
        const eKey = eU + eP;

        let startIndex = allData.findIndex(d => d.key === sKey);
        let endIndex = allData.findLastIndex(d => d.key === eKey);

        if (startIndex === -1 || endIndex === -1) {
            alert("指定された範囲のキーが見つかりませんでした。\n開始: " + sKey + "\n終了: " + eKey);
            return;
        }

        // 範囲を切り出し
        let first = Math.min(startIndex, endIndex);
        let last = Math.max(startIndex, endIndex);
        let rangeData = allData.slice(first, last + 1);
        
        // ランダムに20個選ぶ
        let selected = rangeData.sort(() => 0.5 - Math.random()).slice(0, 20);

        render(selected, mode, school, sKey, eKey);
    }

    function render(data, mode, school, s, e) {
        const tbody = document.getElementById('test-body');
        tbody.innerHTML = '';
        
        document.getElementById('th-q').textContent = mode === 'en-ja' ? '英単語' : '日本語訳';
        document.getElementById('th-a').textContent = mode === 'en-ja' ? '日本語訳' : '英単語';
        document.getElementById('info-tag').textContent = school;
        document.getElementById('range-display').textContent = `抽出範囲: ${s} ～ ${e} (全${data.length}問)`;

        data.forEach((d, i) => {
            const tr = document.createElement('tr');
            const q = mode === 'en-ja' ? d.en : d.ja;
            const a = mode === 'en-ja' ? d.ja : d.en;
            tr.innerHTML = `
                <td class="col-no">${i+1}</td>
                <td>${q}</td>
                <td class="ans" data-ans="${a}">${isShowAnswer ? a : ''}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function toggleAnswer() {
        isShowAnswer = !isShowAnswer;
        document.querySelector('.btn-sub').textContent = `👁 解答表示：${isShowAnswer ? 'ON' : 'OFF'}`;
        document.querySelectorAll('.ans').forEach(td => {
            td.textContent = isShowAnswer ? td.getAttribute('data-ans') : '';
        });
    }

    window.onload = init;
</script>
</body>
</html>
